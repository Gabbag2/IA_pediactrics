data_root: /Volumes/PHILIPS/chbmit
cache_dir: cache
outputs_dir: outputs

channels_common:
  - FP1-F7
  - F7-T7
  - T7-P7
  - P7-O1
  - FP1-F3
  - F3-C3
  - C3-P3
  - P3-O1
  - FP2-F4
  - F4-C4
  - C4-P4
  - P4-O2
  - FP2-F8
  - F8-T8
  - T8-P8
  - P8-O2
  - FZ-CZ
  - CZ-PZ

homologous_pairs:
  - [F7-T7, F8-T8]
  - [T7-P7, T8-P8]
  - [P7-O1, P8-O2]
  - [FP1-F7, FP2-F8]
  - [FP1-F3, FP2-F4]
  - [F3-C3, F4-C4]
  - [C3-P3, C4-P4]
  - [P3-O1, P4-O2]

bands:
  delta: [1, 4]
  theta: [4, 8]
  alpha: [8, 13]
  beta:  [13, 30]
  gamma: [30, 80]

plv_bands: [theta, alpha, beta]

window:
  length_s: 5.0
  step_s: 2.5

preprocessing:
  highpass_hz: 1.0
  lowpass_hz: 80.0
  notch_hz: 60.0

labels:
  # Pre-ictal: 30 min — Ryu & Joe 2021 (CHB-MIT), Mormann 2007 review.
  # Gives ~720 windows / seizure at 2.5 s step, enough to resolve drift trajectory.
  pre_ictal_s: 1800
  # Post-ictal: 30 min — physiologically depressed, genuinely not-interictal.
  post_ictal_s: 1800
  # Guard zone disabled: we want the continuous phase transition, not a
  # sanitised "far-from-seizure" set. Everything outside pre-ictal / ictal /
  # post-ictal is labelled interictal.
  interictal_guard_s: 0

training:
  # Plain CEBRA (Glushanina et al. 2025 recipe): 3-dim joint embedding,
  # behaviour-contrastive via state labels, time_delta sampling. All 3 dims are
  # used for attribution — no subspace split.
  latent_dim: 3
  behavior_dims: 3
  batch_size: 512
  epochs: 3000
  learning_rate: 3.0e-4
  temperature_mode: auto        # auto-tuned temperature per Schneider 2023
  temperature: 1.0              # fallback if temperature_mode is overridden
  time_offset: 10
  conditional: time_delta
  distance: cosine
  # Jacobian-regularisation knobs — only consumed by the dormant
  # fit_xcebra_subspace path. Kept for reproducibility of that stretch goal.
  jacobian_reg_max: 0.01
  jacobian_warmup_frac: 0.25
  jacobian_rampup_frac: 0.50
  seed: 0

core_patients: [chb01, chb03, chb05, chb08, chb10]
